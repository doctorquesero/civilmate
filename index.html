<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CivilMate Pro - Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <script>tailwind.config = { darkMode: 'class' }</script>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <style>
        body { transition: background-color 0.3s, color 0.3s; }
        .tab-active { border-bottom: 2px solid #3b82f6; color: #3b82f6; }
        .tab-inactive { color: #64748b; border-bottom: 2px solid transparent; }
    </style>
</head>
<body class="h-screen flex items-center justify-center font-sans relative overflow-hidden bg-slate-50 dark:bg-[#0f172a] text-slate-900 dark:text-white">

    <button onclick="openSettings()" class="absolute top-6 right-6 text-slate-500 hover:text-slate-800 dark:text-slate-400 dark:hover:text-white transition z-20" title="Display Settings">
        <i class="fas fa-cog text-2xl"></i>
    </button>

    <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 p-8 rounded-2xl shadow-2xl w-full max-w-md relative z-10 transition-colors">
        
        <div class="text-center mb-8">
            <div class="bg-blue-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-blue-500/30">
                <i class="fas fa-hard-hat text-3xl text-white"></i>
            </div>
            <h1 class="text-3xl font-bold tracking-tight">CivilMate <span class="text-blue-500">Pro</span></h1>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-2">Smart Construction Management</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1">Email Address</label>
                <div class="relative">
                    <i class="fas fa-envelope absolute left-3 top-3 text-slate-400"></i>
                    <input type="email" id="logEmail" class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-300 dark:border-slate-700 text-slate-900 dark:text-white rounded-lg py-2 pl-10 pr-3 focus:outline-none focus:border-blue-500 transition-colors" placeholder="admin@company.co.nz">
                </div>
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1">Password</label>
                <div class="relative">
                    <i class="fas fa-lock absolute left-3 top-3 text-slate-400"></i>
                    <input type="password" id="logPassword" class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-300 dark:border-slate-700 text-slate-900 dark:text-white rounded-lg py-2 pl-10 pr-3 focus:outline-none focus:border-blue-500 transition-colors" placeholder="••••••••">
                </div>
            </div>
            
            <p id="errorMsg" class="text-red-500 text-xs font-bold text-center hidden"></p>

            <button id="btnLogin" onclick="loginUser()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg mt-2 shadow-lg transition transform active:scale-95">Sign In <i class="fas fa-sign-in-alt ml-2"></i></button>
            
            <div class="relative flex items-center my-6">
                <div class="flex-grow border-t border-slate-200 dark:border-slate-800"></div>
                <span class="flex-shrink px-4 text-xs font-bold text-slate-400 dark:text-slate-600 uppercase">Or continue with</span>
                <div class="flex-grow border-t border-slate-200 dark:border-slate-800"></div>
            </div>

            <button onclick="loginWithGoogle()" class="w-full bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700 border border-slate-300 dark:border-slate-600 text-slate-700 dark:text-white font-bold py-3 rounded-xl shadow-sm transition flex justify-center items-center gap-2 transform active:scale-95">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5" alt="Google Logo">
                Google
            </button>
        </div>

        <div class="mt-8 pt-8 border-t border-slate-200 dark:border-slate-800 text-center">
            <p class="text-slate-600 dark:text-slate-400 text-sm mb-4">New here? Let's build your organization.</p>
            <button onclick="goToRegister()" class="w-full text-blue-600 dark:text-blue-400 hover:text-white border-2 border-blue-600 dark:border-blue-500 hover:bg-blue-600 dark:hover:bg-blue-500 font-bold py-3 rounded-xl transition transform active:scale-95 flex items-center justify-center gap-2 shadow-sm">
                <i class="fas fa-user-plus text-sm"></i>
                Register for CivilMate Pro
            </button>
        </div>
    </div>

    <div id="settingsModal" class="fixed inset-0 bg-slate-900/50 dark:bg-black/80 hidden items-center justify-center z-50 backdrop-blur-sm p-4">
        <div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 p-6 rounded-2xl w-full max-w-sm shadow-2xl text-slate-900 dark:text-white">
            <h3 class="text-lg font-bold mb-4 flex items-center gap-2"><i class="fas fa-desktop text-blue-500"></i> Display Settings</h3>
            <div class="space-y-3 mb-6">
                <label class="flex items-center gap-3 p-3 border border-slate-200 dark:border-slate-700 rounded-xl cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-700 transition">
                    <input type="radio" name="theme" value="light" onchange="setTheme('light')" class="w-4 h-4 text-blue-600">
                    <i class="fas fa-sun text-amber-500 text-xl"></i><span class="text-sm font-bold">Light Mode (Daylight)</span>
                </label>
                <label class="flex items-center gap-3 p-3 border border-slate-200 dark:border-slate-700 rounded-xl cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-700 transition">
                    <input type="radio" name="theme" value="dark" onchange="setTheme('dark')" class="w-4 h-4 text-blue-600">
                    <i class="fas fa-moon text-indigo-400 text-xl"></i><span class="text-sm font-bold">Dark Mode (Premium)</span>
                </label>
            </div>
            <div class="text-right">
                <button onclick="closeSettings()" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2.5 rounded-xl font-bold text-sm">Done</button>
            </div>
        </div>
    </div>

    <script>
        // FIREBASE INICIALIZACIÓN
        const firebaseConfig = {
            apiKey: "AIzaSyClWpKp8f0axjSEJrnJMKa6jUrerhyrC4A",
            authDomain: "civilmate-pro.firebaseapp.com",
            projectId: "civilmate-pro",
            storageBucket: "civilmate-pro.firebasestorage.app",
            messagingSenderId: "674522561149",
            appId: "1:674522561149:web:4e55096c4f8d72f142cf14"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // LÓGICA DE LOGIN CON CORREO
        function loginUser() {
            const email = document.getElementById('logEmail').value;
            const password = document.getElementById('logPassword').value;
            const errorMsg = document.getElementById('errorMsg');
            const btn = document.getElementById('btnLogin');

            if(!email || !password) {
                errorMsg.innerText = "Please enter both email and password.";
                errorMsg.classList.remove('hidden');
                return;
            }

            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Authenticating...';
            
            auth.signInWithEmailAndPassword(email, password)
            .then(() => { window.location.href = "dashboard.html"; })
            .catch((error) => {
                btn.innerHTML = 'Sign In <i class="fas fa-sign-in-alt ml-2"></i>';
                errorMsg.innerText = error.message;
                errorMsg.classList.remove('hidden');
            });
        }

        // LÓGICA DE LOGIN CON GOOGLE
        function loginWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider)
            .then(() => { window.location.href = "dashboard.html"; })
            .catch((error) => {
                const errorMsg = document.getElementById('errorMsg');
                errorMsg.innerText = error.message;
                errorMsg.classList.remove('hidden');
            });
        }

        // REDIRECCIÓN AUTOMÁTICA SI YA ESTÁ LOGEADO
        auth.onAuthStateChanged((user) => {
            if (user) { window.location.href = "dashboard.html"; }
        });

        // MOTOR DE TEMA VISUAL Y NAVEGACIÓN
        function initTheme() {
            const savedTheme = localStorage.getItem('civilmate_theme') || 'light';
            setTheme(savedTheme, false);
            const radio = document.querySelector(`input[name="theme"][value="${savedTheme}"]`);
            if(radio) radio.checked = true;
        }
        function setTheme(theme, save = true) {
            if (theme === 'dark') document.documentElement.classList.add('dark');
            else document.documentElement.classList.remove('dark');
            if(save) localStorage.setItem('civilmate_theme', theme);
        }
        document.addEventListener('DOMContentLoaded', initTheme);
        function openSettings() { document.getElementById('settingsModal').classList.remove('hidden'); document.getElementById('settingsModal').classList.add('flex'); }
        function closeSettings() { document.getElementById('settingsModal').classList.add('hidden'); document.getElementById('settingsModal').classList.remove('flex'); }
        function goToRegister() { window.location.href = "onboarding.html"; }
    </script>
</body>
</html>
